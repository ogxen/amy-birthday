<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>❤️I love you❤️</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        text-align: center;
        color: #333;
        margin: 0;
        padding: 0;
    }

    h1 {
        margin-top: 30px;
        font-size: 2.5em;
    }

    .container {
        padding: 20px;
    }

    button {
        padding: 10px 20px;
        margin: 10px;
        border: none;
        border-radius: 20px;
        background-color: #ff6b81;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #ff4757;
    }

    select {
        padding: 10px;
        border-radius: 10px;
        margin-top: 10px;
    }

    .card {
        background: white;
        margin: 20px auto;
        padding: 20px;
        border-radius: 15px;
        width: 80%;
        max-width: 400px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .hidden {
        display: none;
    }

    .heart {
        font-size: 2em;
        animation: float 2s infinite;
    }

    @keyframes float {
        0% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0); }
    }
</style>
</head>
<body>

<h1>🎂 Happy Birthday Amyyyyyy 🎂</h1>

<div class="container">

    <!-- Surprise Button -->
    <div class="card">
        <h3>Click me for a fun fact 🦾</h3>
        <button onclick="showSurprise()">Open Gift</button>
        <p id="surpriseText" class="hidden">You are the true gift 💖</p>
    </div>

    <!-- Dropdown Messages -->
    <div class="card">
        <h3>Pick a message 💌</h3>
        <select onchange="showMessage(this.value)">
            <option value="">Choose an option</option>
            <option value="1">What was my first impression of you</option>
            <option value="2">Our future</option>
            <option value="3">My favorite memory</option>
        </select>
        <p id="messageBox"></p>
    </div>

    <!-- Love Notes Generator -->
    <div class="card">
        <h3>Generate a Love Note 💕</h3>
        <button onclick="generateNote()">Generate</button>
        <p id="loveNote"></p>
    </div>

    <!-- Mini Quiz -->
    <div class="card">
        <h3>Mini Quiz 🧠</h3>
        <p>When did we first meet?</p>
        <button onclick="checkAnswer(false)">January</button>
        <button onclick="checkAnswer(true)">The best day ever</button>
        <button onclick="checkAnswer(false)">I forgot</button>
        <p id="quizResult"></p>
    </div>

    <!-- Hearts -->
    <div class="heart">❤️ ❤️ ❤️</div>

</div>

<script>
function showSurprise() {
    document.getElementById("surpriseText").classList.remove("hidden");
}

function showMessage(val) {
    let msg = "";
    if (val === "1") {
        msg = "A very sweet person.";
    } else if (val === "2") {
        msg = "I can't wait for all the moments we'll share together in the future.";
    } else if (val === "3") {
        msg = "Every moment with you feels like my favorite memory.";
    }
    document.getElementById("messageBox").innerText = msg;
}

function generateNote() {
    const notes = [
        "You're my favorite person 💖",
        "Distance means nothing when you mean everything 🌍",
        "I fall for you more every day ❤️",
        "You're my happiness 😊",
        "Forever wouldn't be long enough with you 💕"
    ];
    const random = notes[Math.floor(Math.random() * notes.length)];
    document.getElementById("loveNote").innerText = random;
}

function checkAnswer(correct) {
    if (correct) {
        document.getElementById("quizResult").innerText = "Correct! You know us so well ❤️";
    } else {
        document.getElementById("quizResult").innerText = "Wrong 😜 Try again!";
    }
}
</script>

</body>
</html>
