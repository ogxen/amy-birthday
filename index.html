<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>❤️I love you❤️</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        text-align: center;
        color: #333;
        margin: 0;
        padding: 0;
    }

    h1 {
        margin-top: 30px;
        font-size: 2.5em;
    }

    .container {
        padding: 20px;
    }

    button {
        padding: 10px 20px;
        margin: 10px;
        border: none;
        border-radius: 20px;
        background-color: #ff6b81;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #ff4757;
    }

    select {
        padding: 10px;
        border-radius: 10px;
        margin-top: 10px;
    }

    .card {
        background: white;
        margin: 20px auto;
        padding: 20px;
        border-radius: 15px;
        width: 80%;
        max-width: 400px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .hidden {
        display: none;
    }

    .heart {
        font-size: 2em;
        animation: float 2s infinite;
    }

    @keyframes float {
        0% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0); }
    }

    .slider {
    position: relative;
}

.slider img {
    width: 100%;
    border-radius: 10px;
    height: 250px;
    object-fit: cover;
}

.slider-buttons {
    margin-top: 10px;
}

.dots span {
    cursor: pointer;
    font-size: 20px;
    margin: 5px;
}
</style>
</head>
<body>

<h1>🎂 Happy Birthday Amyyyyyy 🎂</h1>

<div class="container">

    <!-- Surprise Button -->
    <div class="card">
        <h3>Click me for a fun fact 🦾</h3>
        <button onclick="showSurprise()">Open Gift</button>
        <p id="surpriseText" class="hidden">You are the true gift 💖</p>
    </div>

    <!-- Dropdown Messages -->
    <div class="card">
        <h3>Pick a message</h3>
        <select onchange="showMessage(this.value)">
            <option value="">Choose an option</option>
            <option value="1">What was my first impression of you</option>
            <option value="2">If you were a color</option>
            <option value="3">If you were a time of day</option>
            <option value="4">If you were a song</option>
            <option value="5">If you were a word</option>
            <option value="6">Your underrated talent</option>
        </select>
        <p id="messageBox"></p>
    </div>

    <!-- Love Notes Generator -->
    <div class="card">
        <h3>Random notes for you 💕</h3>
        <button onclick="generateNote()">Generate</button>
        <p id="loveNote"></p>
    </div>

<div class="card">
    <h3>If you were a vibe ✨</h3>

    <div class="slider">
        <img id="slide" src="photo1.jpg" alt="memory">
        <img id="slide" src="photo2.jpg" alt="memory">
        <img id="slide" src="photo3.jpg" alt="memory">
        <img id="slide" src="photo4.jpg" alt="memory">
        <img id="slide" src="photo5.jpg" alt="memory">
        <div class="slider-buttons">
            <button onclick="prevSlide()">⬅️</button>
            <button onclick="nextSlide()">➡️</button>
        </div>

        <div class="dots">
            <span onclick="goToSlide(0)">●</span>
            <span onclick="goToSlide(1)">●</span>
            <span onclick="goToSlide(2)">●</span>
        </div>
    </div>
</div>


    
    <!-- Mini Quiz -->
    <div class="card">
        <h3>Mini Quiz</h3>
        <p>How much do I love you?</p>
        <button onclick="checkAnswer(false)">50%</button>
        <button onclick="checkAnswer(true)">Beyond any limit</button>
        <button onclick="checkAnswer(false)">0%</button>
        <p id="quizResult"></p>
    </div>

    <!-- Hearts -->
    <div class="heart">🎂❤️🎂❤️🎂❤️🎂</div>

</div>

<script>
function showSurprise() {
    document.getElementById("surpriseText").classList.remove("hidden");
}

function showMessage(val) {
    let msg = "";
    if (val === "1") {
        msg = "The most approachable and sweetest staff member";
    } else if (val === "2") {
        msg = "If you were a color. I'd say you'd be purple. So distinct and one that stands out even among millions of colors";
    } else if (val === "3") {
        msg = "Easy. You will be sunrise. Because you brighten up the skies in everyone's lives";
    }
    else if (val === "4") {
        msg = "Tera mera pyar amar. It's an urdu song that always reminds me of you";
    }
    else if (val === "5") {
        msg = "Hope! no better word to describe you. It's not just your name but it's what you truly are. A hope for everyone";
    }
    else if (val === "6") {
        msg = "You are great at writing and I know you will never ever admit it but its true";
    }
    document.getElementById("messageBox").innerText = msg;
}

function generateNote() {
    const notes = [
        "You mean the world to me Amu",
        "I'm so proud of you",
        "You are the best. Never ever let anyne tell you otherwise",
        "You are my June",
        "It's you. Always and forever"
    ];
    const random = notes[Math.floor(Math.random() * notes.length)];
    document.getElementById("loveNote").innerText = random;
}

function checkAnswer(correct) {
    if (correct) {
        document.getElementById("quizResult").innerText = "THE ONLY CORRECT ANSWER. AND I ALWAYS WILL!!!!!";
    } else {
        document.getElementById("quizResult").innerText = "Ewwww. Wrong answer 😖";
    }
}

const images = ["photo1.jpg", "photo2.jpg", "photo3.jpg", "photo4.jpg", "photo5.jpg"];
let current = 0;

function showSlide(index) {
    current = index;
    document.getElementById("slide").src = images[current];
}

function nextSlide() {
    current = (current + 1) % images.length;
    showSlide(current);
}

function prevSlide() {
    current = (current - 1 + images.length) % images.length;
    showSlide(current);
}

function goToSlide(index) {
    showSlide(index);
}

// Auto slide every 3 seconds
setInterval(nextSlide, 3000);
</script>

</body>
</html>
